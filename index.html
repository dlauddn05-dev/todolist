<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>작업 기록 — Todo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F7F8F5;
  --ink:#16181D;
  --ink-soft:#5C6470;
  --ink-faint:#9AA3AD;
  --grid:#E2E8EF;
  --blue:#2456E6;
  --blue-soft:#E8EEFC;
  --line:#D4DAE2;
  --danger:#C93D2E;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  font-family:'IBM Plex Sans KR',sans-serif;
  color:var(--ink);
  background-color:var(--paper);
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size:28px 28px;
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:48px 20px 80px;
}
.mono{font-family:'IBM Plex Mono',monospace}
.sheet{
  width:100%;
  max-width:560px;
  background:#FFFFFF;
  border:1px solid var(--line);
  border-radius:2px;
  box-shadow:6px 6px 0 rgba(22,24,29,0.06);
}
header{
  padding:28px 32px 20px;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:16px;
}
header h1{
  font-size:22px;
  font-weight:600;
  letter-spacing:-0.02em;
}
header h1 .no{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  font-weight:500;
  color:var(--blue);
  display:block;
  margin-bottom:4px;
  letter-spacing:0.08em;
}
.datestamp{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  color:var(--ink-soft);
  text-align:right;
  line-height:1.6;
  white-space:nowrap;
}
.progress{
  padding:14px 32px;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  gap:12px;
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  color:var(--ink-soft);
}
.bar{
  flex:1;
  height:8px;
  background:var(--blue-soft);
  border:1px solid var(--line);
  position:relative;
  overflow:hidden;
}
.bar-fill{
  position:absolute;inset:0;
  width:0%;
  background:var(--blue);
  transition:width .35s ease;
}
.entry{
  display:flex;
  gap:10px;
  padding:20px 32px;
  border-bottom:1px solid var(--line);
}
.entry input[type=text]{
  flex:1;
  font-family:inherit;
  font-size:15px;
  color:var(--ink);
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:2px;
  padding:10px 14px;
  outline:none;
  transition:border-color .15s;
}
.entry input[type=text]::placeholder{color:var(--ink-faint)}
.entry input[type=text]:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft)}
.entry button{
  font-family:'IBM Plex Sans KR',sans-serif;
  font-size:14px;
  font-weight:500;
  color:#fff;
  background:var(--ink);
  border:none;
  border-radius:2px;
  padding:10px 20px;
  cursor:pointer;
  transition:background .15s;
}
.entry button:hover{background:var(--blue)}
.entry button:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
ul{list-style:none}
li.task{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 32px;
  border-bottom:1px solid var(--grid);
  animation:slide-in .2s ease;
}
@keyframes slide-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.check{
  width:18px;height:18px;
  flex-shrink:0;
  border:1.5px solid var(--ink-soft);
  border-radius:2px;
  background:none;
  cursor:pointer;
  position:relative;
  transition:border-color .15s, background .15s;
}
.check:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.check[aria-checked=true]{background:var(--blue);border-color:var(--blue)}
.check[aria-checked=true]::after{
  content:'';
  position:absolute;
  left:4px;top:1px;
  width:6px;height:10px;
  border:solid #fff;
  border-width:0 2px 2px 0;
  transform:rotate(45deg);
}
.task-label{
  flex:1;
  font-size:15px;
  line-height:1.5;
  position:relative;
  word-break:break-word;
}
.task-label::after{
  content:'';
  position:absolute;
  left:0;top:52%;
  height:1.5px;
  width:0;
  background:var(--ink-soft);
  transition:width .3s ease;
}
li.done .task-label{color:var(--ink-faint)}
li.done .task-label::after{width:100%}
.task-time{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--ink-faint);
  white-space:nowrap;
}
.del{
  background:none;border:none;
  color:var(--ink-faint);
  font-family:'IBM Plex Mono',monospace;
  font-size:14px;
  cursor:pointer;
  padding:4px 8px;
  border-radius:2px;
  transition:color .15s, background .15s;
}
.del:hover{color:var(--danger);background:#FBEDEB}
.del:focus-visible{outline:2px solid var(--danger);outline-offset:1px}
.empty{
  padding:48px 32px;
  text-align:center;
  color:var(--ink-faint);
  font-size:14px;
  border-bottom:1px solid var(--grid);
}
.empty .mono{display:block;font-size:12px;margin-top:6px;color:var(--blue)}
footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 32px;
  gap:8px;
  flex-wrap:wrap;
}
.filters{display:flex;gap:4px}
.filters button{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  color:var(--ink-soft);
  background:none;
  border:1px solid transparent;
  border-radius:2px;
  padding:5px 10px;
  cursor:pointer;
  transition:color .15s, border-color .15s;
}
.filters button:hover{color:var(--ink)}
.filters button.active{color:var(--blue);border-color:var(--blue)}
.filters button:focus-visible{outline:2px solid var(--blue);outline-offset:1px}
.clear{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  color:var(--ink-faint);
  background:none;border:none;
  cursor:pointer;
  padding:5px 8px;
  transition:color .15s;
}
.clear:hover{color:var(--danger)}
.clear:focus-visible{outline:2px solid var(--danger);outline-offset:1px}
.footnote{
  max-width:560px;
  margin:14px auto 0;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--ink-faint);
  text-align:center;
}
@media (max-width:480px){
  body{padding:24px 12px 60px}
  header,.entry,li.task,.progress,footer{padding-left:20px;padding-right:20px}
  .task-time{display:none}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>
<main style="width:100%;max-width:560px">
  <div class="sheet">
    <header>
      <h1><span class="no">LOG · TODO</span>작업 기록</h1>
      <div class="datestamp" id="datestamp"></div>
    </header>

    <div class="progress">
      <span id="stat">0/0</span>
      <div class="bar" role="progressbar" aria-label="완료율" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="bar">
        <div class="bar-fill" id="bar-fill"></div>
      </div>
      <span id="pct">0%</span>
    </div>

    <div class="entry">
      <input type="text" id="input" placeholder="할 일을 기록해" aria-label="새 할 일" maxlength="120">
      <button id="add">추가</button>
    </div>

    <ul id="list" aria-label="할 일 목록"></ul>
    <div class="empty" id="empty">기록된 작업이 없다<span class="mono">// 위에서 첫 항목을 추가</span></div>

    <footer>
      <div class="filters" role="tablist" aria-label="필터">
        <button data-f="all" class="active">전체</button>
        <button data-f="active">진행중</button>
        <button data-f="done">완료</button>
      </div>
      <button class="clear" id="clear">완료 항목 지우기</button>
    </footer>
  </div>
  <p class="footnote">데이터는 이 브라우저에 저장됨 (localStorage)</p>
</main>

<script>
(function(){
  var KEY='todo-log-v1';
  var todos=[];
  var filter='all';
  var mem=null;

  function load(){
    try{var raw=localStorage.getItem(KEY);if(raw)todos=JSON.parse(raw)||[];}
    catch(e){todos=mem||[];}
  }
  function save(){
    try{localStorage.setItem(KEY,JSON.stringify(todos));}
    catch(e){mem=todos.slice();}
  }

  var list=document.getElementById('list');
  var input=document.getElementById('input');
  var empty=document.getElementById('empty');
  var stat=document.getElementById('stat');
  var pct=document.getElementById('pct');
  var barFill=document.getElementById('bar-fill');
  var bar=document.getElementById('bar');

  var now=new Date();
  var days=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  document.getElementById('datestamp').textContent=
    now.getFullYear()+'.'+String(now.getMonth()+1).padStart(2,'0')+'.'+String(now.getDate()).padStart(2,'0')+' '+days[now.getDay()];

  function fmtTime(ts){
    var d=new Date(ts);
    return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }

  function render(){
    list.innerHTML='';
    var shown=todos.filter(function(t){
      if(filter==='active')return !t.done;
      if(filter==='done')return t.done;
      return true;
    });
    shown.forEach(function(t){
      var li=document.createElement('li');
      li.className='task'+(t.done?' done':'');

      var cb=document.createElement('button');
      cb.className='check';
      cb.setAttribute('role','checkbox');
      cb.setAttribute('aria-checked',t.done?'true':'false');
      cb.setAttribute('aria-label',(t.done?'완료 해제: ':'완료: ')+t.text);
      cb.addEventListener('click',function(){t.done=!t.done;save();render();});

      var label=document.createElement('span');
      label.className='task-label';
      label.textContent=t.text;

      var time=document.createElement('span');
      time.className='task-time';
      time.textContent=fmtTime(t.ts);

      var del=document.createElement('button');
      del.className='del';
      del.textContent='×';
      del.setAttribute('aria-label','삭제: '+t.text);
      del.addEventListener('click',function(){
        todos=todos.filter(function(x){return x.id!==t.id;});
        save();render();
      });

      li.appendChild(cb);li.appendChild(label);li.appendChild(time);li.appendChild(del);
      list.appendChild(li);
    });

    empty.style.display=shown.length?'none':'block';
    if(!todos.length){
      empty.firstChild.textContent='기록된 작업이 없다';
    }else if(!shown.length){
      empty.firstChild.textContent=(filter==='done'?'완료된 항목이 없다':'진행중인 항목이 없다');
    }

    var total=todos.length;
    var done=todos.filter(function(t){return t.done;}).length;
    var p=total?Math.round(done/total*100):0;
    stat.textContent=done+'/'+total;
    pct.textContent=p+'%';
    barFill.style.width=p+'%';
    bar.setAttribute('aria-valuenow',p);
  }

  function add(){
    var text=input.value.trim();
    if(!text)return;
    todos.unshift({id:Date.now()+Math.random(),text:text,done:false,ts:Date.now()});
    input.value='';
    input.focus();
    save();render();
  }

  document.getElementById('add').addEventListener('click',add);
  input.addEventListener('keydown',function(e){if(e.key==='Enter')add();});

  document.querySelectorAll('.filters button').forEach(function(b){
    b.addEventListener('click',function(){
      filter=b.dataset.f;
      document.querySelectorAll('.filters button').forEach(function(x){x.classList.remove('active');});
      b.classList.add('active');
      render();
    });
  });

  document.getElementById('clear').addEventListener('click',function(){
    todos=todos.filter(function(t){return !t.done;});
    save();render();
  });

  load();render();
})();
</script>
</body>
</html>
